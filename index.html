<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>大秦变法·商鞅立木取信 | 互动历史演绎</title>
    <!-- 引入字体与图标库，提升古风质感 -->
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Serif+SC:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* 避免拖动文字，不影响阅读 */
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #2e241f 0%, #1f1915 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Noto Serif SC', 'Times New Roman', serif;
            padding: 20px;
        }

        /* 竹简风格主容器 */
        .scroll-container {
            max-width: 850px;
            width: 100%;
            background: #fef3d6;
            background-image: radial-gradient(circle at 10% 20%, rgba(210, 180, 140, 0.1) 2%, transparent 2.5%);
            background-size: 28px 28px;
            border-radius: 48px 32px 56px 32px;
            box-shadow: 0 30px 40px rgba(0, 0, 0, 0.5), inset 0 1px 3px rgba(255, 245, 200, 0.8);
            border: 1px solid #dbb87c;
            transition: all 0.2s;
        }

        /* 卷轴两端装饰 */
        .scroll-header {
            background: #c1965c;
            padding: 16px 20px;
            border-radius: 48px 32px 0 0;
            border-bottom: 3px solid #e9c27c;
            text-align: center;
            box-shadow: inset 0 -2px 0 #9b6a3a, 0 2px 8px rgba(0,0,0,0.2);
        }

        .scroll-header h1 {
            font-family: 'ZCOOL KuaiLe', cursive;
            font-size: 1.8rem;
            letter-spacing: 6px;
            color: #fffbdd;
            text-shadow: 4px 4px 0 #6b3f1c;
            word-break: keep-all;
        }

        .scroll-header p {
            color: #fff0c0;
            font-size: 0.85rem;
            margin-top: 5px;
            font-style: italic;
        }

        /* 剧情演绎区域 */
        .story-pavilion {
            padding: 28px 24px 20px 24px;
            min-height: 420px;
            background: #fff8ed;
            border-radius: 28px;
            margin: 20px 22px 10px 22px;
            box-shadow: inset 0 0 0 1px #ffeee0, 0 8px 18px rgba(0, 0, 0, 0.2);
            position: relative;
        }

        /* 古风标题纹样 */
        .scene-title {
            font-size: 1.9rem;
            font-weight: 700;
            color: #a55820;
            border-left: 12px solid #c28142;
            padding-left: 18px;
            margin-bottom: 20px;
            letter-spacing: 2px;
            text-shadow: 1px 1px 0 #ffebc2;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .scene-title i {
            font-size: 1.8rem;
            color: #bd7a3a;
        }

        .story-text {
            font-size: 1.08rem;
            line-height: 1.75;
            color: #2c2418;
            margin-bottom: 28px;
            text-align: justify;
            background: #fffef7;
            padding: 16px 18px;
            border-radius: 24px;
            border: 1px dashed #e7cfaa;
            font-weight: 500;
        }

        .story-text p {
            margin-bottom: 12px;
        }

        .highlight {
            background: linear-gradient(120deg, #ffe6b3 0%, #ffdd99 80%);
            padding: 2px 8px;
            border-radius: 20px;
            font-weight: bold;
            color: #9b4b1a;
            font-size: 0.95em;
        }

        .inscription {
            font-style: italic;
            font-size: 0.95rem;
            color: #7c5a3a;
            border-top: 1px dashed #e2c294;
            margin-top: 12px;
            padding-top: 10px;
            text-align: right;
        }

        /* 互动按钮区域 */
        .action-area {
            margin: 8px 22px 28px 22px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 18px;
        }

        .btn-warrior {
            background: #4c2f1d;
            border: none;
            color: #f7eac5;
            font-family: 'Noto Serif SC', monospace;
            font-weight: bold;
            font-size: 1.05rem;
            padding: 12px 28px;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 5px 0 #2a1a0e;
            letter-spacing: 1px;
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }

        .btn-warrior i {
            font-size: 1.2rem;
        }

        .btn-warrior:hover {
            background: #744b2c;
            transform: translateY(-2px);
            box-shadow: 0 7px 0 #2a1a0e;
        }

        .btn-warrior:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #2a1a0e;
        }

        .btn-reset {
            background: #6f4e2e;
            box-shadow: 0 4px 0 #3f2a17;
        }

        .btn-reset:hover {
            background: #8b623f;
        }

        .footer-note {
            text-align: center;
            padding: 12px 20px 20px 20px;
            font-size: 0.75rem;
            color: #b68b54;
            border-top: 1px solid #ebd5b0;
            margin-top: 5px;
            font-family: monospace;
        }

        @media (max-width: 600px) {
            .scroll-container {
                border-radius: 32px 24px 40px 24px;
            }
            .scene-title {
                font-size: 1.5rem;
            }
            .story-text {
                font-size: 0.95rem;
                padding: 12px;
            }
            .btn-warrior {
                padding: 8px 18px;
                font-size: 0.9rem;
            }
            .action-area {
                gap: 12px;
            }
        }

        /* 简单的装饰图案 */
        .story-pavilion::before {
            content: "⚔️";
            position: absolute;
            bottom: 15px;
            right: 20px;
            font-size: 38px;
            opacity: 0.08;
            pointer-events: none;
            font-family: monospace;
        }
    </style>
</head>
<body>

<div class="scroll-container">
    <div class="scroll-header">
        <h1><i class="fas fa-landmark"></i> 商鞅 · 立木取信 <i class="fas fa-dragon"></i></h1>
        <p>「法之信，国之本也」| 互动演绎 · 重塑大秦风云</p>
    </div>

    <div class="story-pavilion" id="storyContent">
        <!-- 动态剧情区域 -->
        <div class="scene-title" id="sceneTitle">
            <i class="fas fa-scroll"></i> <span id="titleText">序幕</span>
        </div>
        <div class="story-text" id="storyDesc">
            <!-- 剧情文本动态渲染 -->
        </div>
    </div>

    <div class="action-area" id="actionButtons">
        <!-- 动态按钮区域 -->
    </div>
    <div class="footer-note">
        <i class="fas fa-history"></i> 亲历徙木立信，见证法治之威 · 每一次抉择都将影响民心向背
    </div>
</div>

<script>
    // ---------- 互动剧情状态机 ----------
    // 场景定义 (每一个场景包含: title, descHTML, buttons数组)
    // 确保完整展现商鞅立木取信与变法全貌

    const scenes = {
        // 序幕：变法雄心 + 立木背景
        prologue: {
            title: "📜 序幕 · 革故鼎新",
            desc: `
                <p>战国烽烟，七雄争霸。<span class="highlight">秦孝公</span>力排众议，颁布《求贤令》。卫鞅（后称商鞅）携《法经》入秦，阐述富国强兵之策。孝公大喜，拜为左庶长，欲推行新法。</p>
                <p>然秦国久受旧贵族盘剥，官府朝令夕改，百姓对法令半信半疑。商鞅深知：<strong>“法不信于民，则令不行”</strong> 。如何让天下人相信新法的威严与公正？</p>
                <p>一道奇策正在酝酿——<span class="highlight">徙木立信</span>，从此惊天一诺，开启变法大业。</p>
                <div class="inscription">《史记·商君列传》：“令既具，未布，恐民之不信己…”</div>
            `,
            buttons: [
                { text: "🏮 前往国都南门 · 观立木", action: "goToStanding" }
            ]
        },
        // 南门立木，悬赏搬木 (关键互动分支)
        standing: {
            title: "🏯 南门立木 · 悬赏五十金",
            desc: `
                <p>秦都栎阳，南门市井人潮涌动。商鞅命吏卒竖立一根三丈之木，旁贴告示：<strong>“能徙此木于北门者，赏十金！”</strong> 百姓围观议论：“一根木头，赏十金？定是戏弄我等！” 无人敢应。</p>
                <p>商鞅见状，将赏金加至<strong class="highlight">五十金</strong>！黄灿灿的铜铤堆在木旁，光芒灼人。众人既心动又疑惧：“其中必有诈，恐怕搬完木头就会治罪……”</p>
                <p>商鞅抚须一笑，朗声道：“大秦新法，言出必行！今日徙木，明日变法，信义为基！”</p>
                <p><i class="fas fa-question-circle"></i> 身为咸阳闾里的一位壮士/百姓，你面临一生最重要的抉择——</p>
            `,
            buttons: [
                { text: "⚡ 挺身而出 · 我愿徙木", action: "branchTry" },
                { text: "🤔 谨慎观望 · 再等等看", action: "branchWatch" }
            ]
        },
        // 分支1: 亲自徙木成功
        trySuccess: {
            title: "🏅 壮士徙木 · 一诺千金",
            desc: `
                <p>你穿过人群，大步走到木前，沉声喝道：“俺来！” 双臂发力扛起三丈之木，一步一印朝着北门而去。身后百姓惊呼，官吏策马跟随。</p>
                <p>到达北门，你放下木头，汗水涔涔。商鞅亲自迎上前，取出<strong class="highlight">五十金</strong>交予你手中，高声宣布：“徙木者，赏金不欺！自今日起，秦国新法，赏罚必信！”</p>
                <p>围观百姓哗然，继而雷动欢呼：“官府言而有信！商君一言重如山！” 你的勇气，成为了大秦变法第一块基石。<br>从此，<strong>“徙木立信”</strong> 传遍六国，民心归附，新法势不可挡。</p>
                <div class="inscription"><i class="fas fa-hand-holding-usd"></i> 历史之鉴：重诺轻利，取信于民，法治得行。</div>
            `,
            buttons: [
                { text: "📜 聆听新法 · 变法诏令颁布", action: "toLawReform" }
            ]
        },
        // 分支2: 观望，由另一位壮士完成
        watchSuccess: {
            title: "👀 观望之后 · 诚信震惊",
            desc: `
                <p>你与多数百姓一样驻足观望，心中忐忑：“官府素来无信，万一搬了木头反遭责罚？”</p>
                <p>但片刻后，人群中走出一位黝黑壮汉，大喝：“商君乃孝公重臣，岂会戏弄黔首！我来搬！” 他奋力扛木至北门。商鞅当众兑现<strong class="highlight">五十金</strong>！壮汉捧着黄金激动落泪。</p>
                <p>你内心既惭愧又敬佩，更深切明白：<strong>大秦即将变天，新法必将雷厉风行！</strong> 围观百姓皆跪地高呼：“左庶长令出必行，我等愿遵新法！” 从此，变法信任的种子深植民心。</p>
                <div class="inscription">《韩非子》云：“小信成则大信立，故明主积于信。” 商鞅以徙木立信，成就变法之基。</div>
            `,
            buttons: [
                { text: "🏛️ 颁布《垦草》《战功》新法", action: "toLawReform" }
            ]
        },
        // 变法令：推行具体内容（完整剧情核心）
        lawReform: {
            title: "⚙️ 商鞅变法 · 雷霆新政",
            desc: `
                <p>徙木立信后，百姓皆知官府言出必行。商鞅趁势颁布《秦律》新法：</p>
                <p>• <strong>废井田，开阡陌</strong> —— 承认土地私有，鼓励农耕。<br>
                • <strong>奖励军功，颁二十等爵</strong> —— 有军功者，各以率受上爵，宗室无军功不得属籍。<br>
                • <strong>编定户籍，什伍连坐</strong> —— 使“家给人足”，治安严明。<br>
                • <strong>重农抑商</strong>，发展耕战，国强民富。</p>
                <p>新法推行一年，旧贵族怨声载道，百姓初时亦有不便，但秦国农业军力迅速提振。然而贵族暗中抵制：“法度严峻，我等昔日特权尽失！”</p>
                <p>太子嬴驷触犯新法，举国瞩目——商鞅将如何抉择？</p>
            `,
            buttons: [
                { text: "👑 太子犯法 · 刑不上大夫？", action: "toPrinceCase" }
            ]
        },
        // 太子犯法，惩处师傅
        princeCase: {
            title: "⚖️ 太子犯法 · 刑无等级",
            desc: `
                <p>新法施行第二年，太子嬴驷（后来的秦惠文王）因私自违禁，触犯新律。朝野震动：太子乃储君，若惩处则王室颜面何存？若不惩，新法必废！</p>
                <p>商鞅凛然进谏：<strong>“法之不行，自上犯之。太子犯法与庶民同罪，然太子不可施刑，当刑其傅！”</strong> 于是，太傅公子虔被处以劓刑，老师公孙贾被施以黥刑。</p>
                <p>消息传遍秦国，贵族股栗，百姓叹服：“商君铁面无私，连太子师傅都敢惩罚！” 从此无人再敢轻易违抗新法，秦国上下遵纪守法，夜不闭户，路不拾遗。</p>
                <p>变法十年，国库充盈，甲兵强盛，山东六国始知秦有虎狼之威。</p>
            `,
            buttons: [
                { text: "🌾 盛世大治 · 秦国崛起", action: "toFinale" }
            ]
        },
        // 终章：变法成效， 秦统一基石
        finale: {
            title: "🏆 法行天下 · 强秦之基",
            desc: `
                <p>商鞅变法二十余载，秦国道不拾遗，山无盗贼，民勇于公战而怯于私斗，乡邑大治。</p>
                <p>河西之战收复失地，迁都咸阳，新法深入人心。虽然后来商鞅遭旧贵族报复车裂，但其法未废，秦国依靠这套法治体系最终横扫六合，一统天下！</p>
                <p><span class="highlight">“立木取信”</span>成为千古佳话，印证诚信乃立政之本。历史洪流中，商鞅以一诺而破疑云，开创华夏法家新纪元。</p>
                <p><i class="fas fa-crown"></i> 感谢你亲历这段波澜壮阔的变法史诗！</p>
                <div class="inscription">太史公曰：“商君，其天资刻薄人也，然其法行，秦以强。” 信义之重，万古流芳。</div>
            `,
            buttons: [
                { text: "🔄 重演立木 · 再临战国", action: "resetToBeginning" },
                { text: "📖 敬仰先贤 · 返回序幕", action: "resetToBeginning" }
            ]
        }
    };

    // ---------- 辅助函数 ----------
    function updateUI(sceneKey) {
        const scene = scenes[sceneKey];
        if (!scene) {
            // 容错，回到序幕
            updateUI('prologue');
            return;
        }
        // 更新标题与文本
        document.getElementById('titleText').innerHTML = scene.title;
        document.getElementById('storyDesc').innerHTML = scene.desc;
        
        // 动态生成按钮
        const btnContainer = document.getElementById('actionButtons');
        btnContainer.innerHTML = '';
        if (scene.buttons && scene.buttons.length > 0) {
            scene.buttons.forEach(btn => {
                const buttonEl = document.createElement('button');
                buttonEl.className = 'btn-warrior';
                // 增加小图标
                if (btn.text.includes('🏮') || btn.text.includes('前往')) {
                    buttonEl.innerHTML = `<i class="fas fa-arrow-right"></i> ${btn.text}`;
                } else if (btn.text.includes('⚡') || btn.text.includes('挺身')) {
                    buttonEl.innerHTML = `<i class="fas fa-fist-raised"></i> ${btn.text}`;
                } else if (btn.text.includes('🏛️') || btn.text.includes('📜')) {
                    buttonEl.innerHTML = `<i class="fas fa-gavel"></i> ${btn.text}`;
                } else if (btn.text.includes('⚖️')) {
                    buttonEl.innerHTML = `<i class="fas fa-balance-scale"></i> ${btn.text}`;
                } else if (btn.text.includes('重演') || btn.text.includes('返回')) {
                    buttonEl.innerHTML = `<i class="fas fa-undo-alt"></i> ${btn.text}`;
                } else {
                    buttonEl.innerHTML = `<i class="fas fa-hand-point-right"></i> ${btn.text}`;
                }
                
                // 绑定动作
                buttonEl.addEventListener('click', () => {
                    const action = btn.action;
                    switch (action) {
                        case 'goToStanding':
                            updateUI('standing');
                            break;
                        case 'branchTry':
                            updateUI('trySuccess');
                            break;
                        case 'branchWatch':
                            updateUI('watchSuccess');
                            break;
                        case 'toLawReform':
                            updateUI('lawReform');
                            break;
                        case 'toPrinceCase':
                            updateUI('princeCase');
                            break;
                        case 'toFinale':
                            updateUI('finale');
                            break;
                        case 'resetToBeginning':
                            updateUI('prologue');
                            break;
                        default:
                            // 若动作对应场景直接存在，则跳转
                            if (scenes[action]) updateUI(action);
                            else updateUI('prologue');
                    }
                });
                btnContainer.appendChild(buttonEl);
            });
        } else {
            // 安全后备：如果没有按钮，则添加重置按钮
            const resetBtn = document.createElement('button');
            resetBtn.className = 'btn-warrior btn-reset';
            resetBtn.innerHTML = '<i class="fas fa-history"></i> 重开剧情';
            resetBtn.addEventListener('click', () => updateUI('prologue'));
            btnContainer.appendChild(resetBtn);
        }
    }

    // 增加额外历史沉浸小彩蛋：当进入trySuccess或watchSuccess时背景微妙变化（很简单的动态感，不用太复杂）
    // 在关键情节加一点仪式感
    function extraAtmosphere(sceneKey) {
        const storyDiv = document.querySelector('.story-pavilion');
        if (sceneKey === 'trySuccess') {
            storyDiv.style.transition = "all 0.4s";
            storyDiv.style.boxShadow = "inset 0 0 0 1px #ffdd99, 0 8px 20px rgba(212, 165, 80, 0.3)";
            setTimeout(() => { storyDiv.style.boxShadow = ""; }, 800);
        } else if (sceneKey === 'watchSuccess') {
            storyDiv.style.borderLeft = "6px solid #c28142";
            setTimeout(() => { storyDiv.style.borderLeft = ""; }, 600);
        }
    }

    // 包装更新UI，加入氛围小效果
    const originalUpdate = updateUI;
    window.updateUI = function(sceneKey) {
        originalUpdate(sceneKey);
        extraAtmosphere(sceneKey);
        // 滚动至剧情区域，移动端体验更好
        document.querySelector('.story-pavilion').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }.bind(this);

    // 初始加载序幕
    updateUI('prologue');

    // 手动修正按钮额外命名兼容
    // 为了确保情节中迁徙立信及变法所有环节都融入了“完整剧情”的互动，所有分支都衔接历史走向。
    // 增加全局重置监听额外安全（已包含）
    // 以及为用户提供更好的信息提示，确保体验战国风云完整脉络
    console.log("商鞅立木取信互动演绎 | 法治精神千古流传");
</script>
</body>
</html>
